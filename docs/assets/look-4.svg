<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" role="img" aria-labelledby="title desc">
<title>Luma colour atmosphere</title>
<desc>Abstract futuristic salon artwork for demo use.</desc>
<defs>
